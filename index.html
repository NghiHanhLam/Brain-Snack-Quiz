<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Snack</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Space+Mono&display=swap");
      /* ─── Cute Cozy Office RPG Design Tokens ────────────────── */
      :root {
        --bg: #e2e8f5; /* Light blue desk mat */
        --bg2: #ffffff; /* Fresh crisp sketchbook/memo page */
        --bg3: #f4f0f8; /* Soft marshmallow lavender tray */
        --accent: #a8b5e0; /* Pastel blue tape */
        --accent2: #d6b8e6; /* Sweet lilac tape */
        --txt: #2a2a35; /* Dark chunky ink */
        --txt2: #65657b; /* Soft pencil lead gray */
        --border: #2a2a35; /* Chunky black/dark purple pixel border */
        --success: #8dd6b0; /* Fresh desk plant */
        --danger: #d37a7a; /* Strawberry eraser */
        --warn: #f5d487; /* Warm cozy desk lamp */
        --card: #ffffff; /* Creamy matte paper */
        --shadow: 4px 4px 0px var(--border); /* Hard solid pixel shadow */
        --radius: 4px; /* Crisp corners */
        --font-display: "Quicksand", system-ui, sans-serif;
        --font-mono: "Space Mono", monospace;
        --transition: 0.1s; /* Snappy, no smooth fading */
        --nav-h: 80px;
        --folder: #fbd3a0; /* Warm manila folder yellow */
        --folder-border: #955958;
      }

      [data-theme="dark"] {
        --bg: #2a2a35;
        --bg2: #3d3d4e;
        --bg3: #4a4a5e;
        --accent: #7886b5;
        --accent2: #a68ab5;
        --txt: #f4f0f8;
        --txt2: #b5b5c8;
        --border: #181820;
        --card: #3d3d4e;
        --shadow: 4px 4px 0px #181820;
        --folder: #946e54; /* A deeper, cozy wood/leather color for dark mode */
        --folder-border: #6d4d3a;
      }

      /* ─── Reset ─────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 15px;
      }
      body {
        font-family: var(--font-display);
        font-size: 16px;
        background-color: var(--bg);
        background-image: radial-gradient(
          var(--accent) 1.5px,
          transparent 1.5px
        );
        background-size: 24px 24px; /* Dot grid spacing */
        color: var(--txt);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      button {
        cursor: pointer;
        font-family: inherit;
      }
      input,
      select,
      textarea {
        font-family: inherit;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 99px;
      }

      /* ─── Top Nav ───────────────────────────────────────────── */
      #topnav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        background: var(--bg2); /* Changed to white/paper color */
        border-bottom: 2px solid var(--border);
        box-shadow: 0 4px 0 rgba(42, 42, 53, 0.1);
        display: flex;
        align-items: center;
        padding: 0 16px;
        z-index: 100;
      }

      #topnav-left {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-right: 20px;
        flex-shrink: 0;
      }
      .logo-icon {
        width: 34px;
        height: 34px;
        min-width: 34px;
        background: var(--accent2);
        border: 2px solid var(--border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        color: var(--txt);
      }
      #topnav .logo-text {
        color: var(--txt); /* Dark text instead of white */
        font-size: 1.5rem;
      }

      /* ─── Desktop nav links ─────────────────────────────────── */
      .topnav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 1;
        overflow: hidden;
      }
      .topnav-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 13px;
        border: none;
        border-radius: 8px;
        background: none;
        color: #8890b5;
        font-size: 0.83rem;
        font-weight: 600;
        white-space: nowrap;
        transition:
          background var(--transition),
          color var(--transition);
      }
      .topnav-btn:hover {
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
      }
      .topnav-btn.active {
        background: rgba(79, 110, 247, 0.25);
        color: #fff;
      }
      .topnav-btn {
        color: var(--txt2);
        font-size: 1.2rem;
      }
      .topnav-btn:hover {
        background: var(--bg3);
        color: var(--txt);
      }
      .topnav-btn.active {
        background: var(--accent);
        border: 2px solid var(--border);
        color: var(--txt);
        box-shadow: 2px 2px 0 var(--border);
        transform: translateY(-2px);
      }
      /* ─── Right side of topnav ──────────────────────────────── */
      #topnav-right {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        flex-shrink: 0;
      }
      #theme-toggle {
        background: var(--bg3);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 2px 5px;
        color: var(--txt2);
        font-size: 1rem;
        transition: all var(--transition);
      }
      #theme-toggle:hover {
        background: var(--accent2);
        color: var(--txt);
      }
      #topnav-hamburger {
        display: none;
        background: var(--accent2);
        border: 2px solid var(--border);
        border-radius: 4px;
        padding: 2px 5cqmin;
        color: #fff;
        font-size: 1rem;
        transition: all var(--transition);
      }
      #topnav-hamburger:hover {
        background: var(--accent2);
      }
      /* ─── Mobile drawer ─────────────────────────────────────── */
      #topnav-drawer {
        position: fixed;
        top: var(--nav-h);
        left: 0;
        right: 0;
        background: #1e2235;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        padding: 10px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 99;
        transform: translateY(-110%);
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #topnav-drawer.open {
        transform: translateY(0);
      }
      .drawer-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px 12px;
        border: none;
        border-radius: 9px;
        background: none;
        color: #8890b5;
        font-size: 0.88rem;
        font-weight: 600;
        text-align: left;
        transition:
          background var(--transition),
          color var(--transition);
      }
      .drawer-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
      }
      .drawer-btn.active {
        background: rgba(79, 110, 247, 0.22);
        color: #fff;
      }

      .drawer-divider {
        font-size: 0.63rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #4a5278;
        padding: 10px 12px 4px;
      }
      .drawer-exam-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 12px 8px 24px;
        border: none;
        border-radius: 8px;
        background: none;
        color: #8890b5;
        font-size: 0.82rem;
        text-align: left;
        transition:
          background var(--transition),
          color var(--transition);
      }
      .drawer-exam-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }
      .drawer-exam-btn.active {
        background: rgba(79, 110, 247, 0.28);
        color: #fff;
      }

      #topnav-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: var(--nav-h);
        background: rgba(0, 0, 0, 0.4);
        z-index: 98;
      }
      #topnav-backdrop.visible {
        display: block;
      }

      /* ─── Main content (pushed below nav) ───────────────────── */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-top: var(--nav-h);
        min-height: calc(100vh - var(--nav-h));
        overflow-y: auto;
      }
      #topbar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 10px 24px;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .breadcrumb {
        font-size: 1.5rem;
        color: var(--txt2);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .breadcrumb span {
        color: var(--txt);
        font-weight: 600;
      }

      #page-container {
        flex: 1;
        padding: 24px;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
      }

      /* ─── Status dot ────────────────────────────────────────── */
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        min-width: 7px;
        background: #4a5278;
      }
      .status-dot.done {
        background: var(--success);
      }
      .status-dot.inprog {
        background: var(--warn);
      }
      .status-dot.new {
        background: #4a5278;
      }

      /* ─── Cards ─────────────────────────────────────────────── */
      .card,
      .question-card {
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 22px;
        box-shadow: var(--shadow);
        position: relative; /* Needed for tape */
        margin-top: 14px;
      }
      .card + .card {
        margin-top: 14px;
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .section-head h2 {
        font-size: 1.15rem;
        font-weight: 700;
      }

      /* ─── Buttons ───────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 16px;
        border-radius: var(--radius);
        font-size: 1.1rem; /* Adjusted for pixel font */
        border: 2px solid var(--border);
        box-shadow: 2px 2px 0 var(--border);
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        text-transform: uppercase;
      }
      .btn:hover,
      .btn:active {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0 var(--border); /* Flatten shadow on press */
      }

      .btn-primary {
        background: var(--accent);
        color: var(--txt); /* Keep text dark for contrast */
      }
      .btn-primary:hover {
        background: #3d58e3;
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(79, 110, 247, 0.4);
      }
      .btn-secondary {
        background: var(--bg2);
        color: var(--txt);
      }
      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-danger {
        background: #fee2e2;
        color: var(--danger);
      }
      .btn-danger:hover {
        background: var(--danger);
        color: #fff;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 0.78rem;
      }

      /* ─── Exam grid / cards ─────────────────────────────────── */
      .exams-grid {
        display: grid;
        /*grid-template-columns: repeat(auto-fill, minmax(240px, 280px));*/
        grid-template-columns: repeat(
          3,
          1fr
        ); /* Forces exactly 3 equal columns */
        gap: 16px;
      }
      .exam-card {
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        cursor: pointer;
        box-shadow: var(--shadow);
        position: relative;
      }
      .exam-card::before {
        display: none;
      }
      .exam-card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--border);
      }
      .exam-card h3 {
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .exam-card .meta {
        font-size: 0.76rem;
        color: var(--txt2);
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 99px;
        margin-top: 10px;
      }
      .status-badge.done {
        background: #d1fae5;
        color: #065f46;
      }
      .status-badge.inprog {
        background: #fef3c7;
        color: #92400e;
      }
      .status-badge.new {
        background: var(--bg3);
        color: var(--txt2);
      }
      /* Create the Washi Tape effect */
      .exam-card::after,
      .question-card::after {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%) rotate(-3deg);
        width: 50px;
        height: 18px;
        background: var(--accent);
        border: 2px solid var(--border);
        box-shadow: 2px 2px 0 var(--border);
        opacity: 0.9;
        z-index: 10;
      }

      /* Alternate tape color & angle for variety */
      .exam-card:nth-child(even)::after {
        background: var(--accent2);
        transform: translateX(-50%) rotate(4deg);
      }
      /* ─── Quiz ──────────────────────────────────────────────── */
      #quiz-header {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 41px;
        z-index: 4;
        box-shadow: var(--shadow);
      }
      .quiz-title {
        font-size: 1rem;
        font-weight: 700;
        flex: 1;
      }
      .quiz-progress-bar {
        height: 6px;
        background: var(--bg3);
        border-radius: 99px;
        overflow: hidden;
        flex: 1;
        max-width: 260px;
      }
      .quiz-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 99px;
        transition: width 0.4s ease;
      }

      /* ─── Question cards ────────────────────────────────────── */
      .q-number {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .q-type-badge {
        background: var(--bg3);
        color: var(--txt2);
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 99px;
        font-weight: 600;
      }
      .q-text {
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.55;
        margin-bottom: 18px;
      }
      .q-image-container {
        margin-bottom: 18px;
        max-width: 100%;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--bg);
        display: inline-block;
      }
      .q-image-preview {
        max-height: 280px;
        max-width: 100%;
        display: block;
        object-fit: contain;
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .choice-label {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 12px 16px;
        border-radius: 10px;
        border: 2px solid var(--border);
        cursor: pointer;
        transition: all var(--transition);
        font-size: 0.9rem;
        -webkit-user-select: none;
        user-select: none;
      }
      .choice-label:hover {
        border-color: var(--accent);
        background: rgba(79, 110, 247, 0.06);
      }
      .choice-label input {
        display: none;
      }
      .choice-custom {
        width: 20px;
        height: 20px;
        min-width: 20px;
        border: 2px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: transparent;
      }
      .choice-label.radio .choice-custom {
        border-radius: 50%;
      }
      .choice-label.checkbox .choice-custom {
        border-radius: 5px;
      }
      .choice-label.selected {
        border-color: var(--accent);
        background: rgba(79, 110, 247, 0.08);
      }
      .choice-label.selected .choice-custom {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .choice-label.correct {
        border-color: var(--success) !important;
        background: rgba(16, 185, 129, 0.08) !important;
      }
      .choice-label.correct .choice-custom {
        background: var(--success);
        border-color: var(--success);
        color: #fff;
      }
      .choice-label.incorrect {
        border-color: var(--danger) !important;
        background: rgba(239, 68, 68, 0.08) !important;
      }
      .choice-label.incorrect .choice-custom {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .choice-label.show-correct {
        border-color: var(--success) !important;
        background: rgba(16, 185, 129, 0.05) !important;
      }
      .choice-text {
        flex: 1;
        line-height: 1.45;
      }
      .choice-label.disabled {
        cursor: default;
      }
      .choice-icon {
        margin-left: auto;
        font-weight: bold;
      }

      /* ─── Feedback ──────────────────────────────────────────── */
      .feedback-box {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 10px;
        border-left: 4px solid;
        font-size: 0.87rem;
        line-height: 1.6;
      }
      .feedback-box.correct {
        background: rgba(16, 185, 129, 0.08);
        border-color: var(--success);
        color: #065f46;
      }
      .feedback-box.incorrect {
        background: rgba(239, 68, 68, 0.08);
        border-color: var(--danger);
        color: #991b1b;
      }
      [data-theme="dark"] .feedback-box.correct {
        color: #6ee7b7;
      }
      [data-theme="dark"] .feedback-box.incorrect {
        color: #fca5a5;
      }
      .feedback-title {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .feedback-box .explanation {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
      }
      .q-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
      }

      /* ─── Summary ───────────────────────────────────────────── */
      .summary-hero {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: var(--radius);
        padding: 28px;
        color: #fff;
        text-align: center;
        margin-bottom: 20px;
      }
      .summary-score {
        font-size: 3.5rem;
        font-weight: 900;
        line-height: 1;
      }
      .summary-score span {
        font-size: 1.4rem;
        opacity: 0.8;
      }
      .review-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--txt2);
        margin-left: auto;
        -webkit-user-select: none;
        user-select: none;
      }
      .toggle-switch {
        width: 38px;
        height: 21px;
        border-radius: 99px;
        background: var(--border);
        position: relative;
        display: inline-block;
        transition: background 0.2s ease;
      }
      .toggle-switch::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: #fff;
        transition: transform var(--transition);
      }
      .toggle-switch.on {
        background: var(--accent);
      }
      .toggle-switch.on::after {
        transform: translateX(17px);
      }

      /* ─── Admin ─────────────────────────────────────────────── */
      .admin-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border);
      }
      .admin-tab {
        padding: 8px 16px;
        background: none;
        font-size: 1rem;
        font-weight: 600;
        color: var(--txt2);
        border: 2px solid transparent; /* Prevents layout jumping */
        border-bottom: 2px solid transparent;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition);
      }
      /* ─── Active Admin Tab ─── */
      .admin-tab.active {
        color: var(
          --txt
        ); /* Darker text for better legibility against the background */
        background: var(--bg3); /* Uses your soft lavender tray color */
        border-bottom-color: var(
          --accent
        ); /* Keeps your pastel blue accent line */
        border-radius: 8px 8px 0 0; /* Rounds the top corners like a physical folder tab */
        border-top: 2px solid var(--border); /* Adds the chunky pixel border to the top */
        border-left: 2px solid var(--border); /* And the left */
        border-right: 2px solid var(--border); /* And the right */
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--txt2);
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .form-input {
        width: 100%;
        padding: 10px 13px;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        background: var(--bg);
        color: var(--txt);
        font-size: 0.88rem;
        outline: none;
      }
      .form-input:focus {
        border-color: var(--accent);
      }
      textarea.form-input {
        min-height: 80px;
      }
      .choice-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        margin-bottom: 8px;
        background: var(--bg);
      }
      .choice-row.correct-choice {
        border-color: var(--success);
        background: rgba(16, 185, 129, 0.05);
      }
      .choice-row input[type="text"] {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--txt);
        outline: none;
      }
      .choice-row .correct-toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--txt2);
        cursor: pointer;
      }

      /* ─── Toast & Modal ─────────────────────────────────────── */
      #toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 9999;
      }
      .toast {
        background: var(--txt);
        color: var(--bg);
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 0.85rem;
        box-shadow: var(--shadow);
      }
      .toast.success {
        background: var(--success);
        color: #fff;
      }
      .toast.error {
        background: var(--danger);
        color: #fff;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .modal {
        background: var(--card);
        border-radius: var(--radius);
        padding: 28px;
        max-width: 500px;
        width: 90%;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
      }

      /* ─── Code / Rich editor ────────────────────────────────── */
      .q-text pre {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        margin: 12px 0;
        overflow-x: auto;
      }
      .q-text code {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: var(--accent2);
      }
      .q-text p code {
        background: var(--bg3);
        padding: 2px 6px;
        border-radius: 4px;
        color: var(--danger);
      }

      .rich-editor-wrap {
        border: 1.5px solid var(--border);
        border-radius: 9px;
        overflow: hidden;
        background: var(--bg);
      }
      .rich-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 6px;
        border-bottom: 1px solid var(--border);
        background: var(--bg3);
      }
      .rt-btn {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--txt2);
        transition: all var(--transition);
      }
      .rt-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .rich-editor-wrap textarea.form-input {
        border: none;
        border-radius: 0;
        margin: 0;
      }
      .rich-editor-wrap textarea.form-input:focus {
        box-shadow: none;
      }
      .rich-preview {
        border-top: 1px solid var(--border);
        padding: 10px 12px;
        background: var(--card);
      }
      .rich-preview-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--txt2);
        margin-bottom: 6px;
      }
      .rich-preview-body {
        font-size: 0.88rem;
        line-height: 1.6;
      }
      .rich-preview-body pre {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        overflow-x: auto;
      }
      .rich-preview-body code {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--accent2);
      }
      .rich-preview-body img,
      .q-text img,
      .feedback-box .explanation img {
        max-width: 100%;
        border-radius: 8px;
        margin: 10px 0;
        display: block;
      }

      .math-btn-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .math-tpl-btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 8px 4px;
        font-size: 0.95rem;
        font-weight: 600;
        transition: all var(--transition);
      }
      .math-tpl-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(79, 110, 247, 0.08);
      }
      .math-preview-box {
        min-height: 46px;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        padding: 10px 14px;
        background: var(--bg);
        display: flex;
        align-items: center;
        overflow-x: auto;
      }

      .choice-row .row-tools {
        display: flex;
        gap: 4px;
      }
      .choice-row .row-tool-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 7px;
        font-size: 0.72rem;
        color: var(--txt2);
      }
      .choice-row .row-tool-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ─── Responsive ────────────────────────────────────────── */
      @media (max-width: 700px) {
        .exams-grid {
          grid-template-columns: 1fr; /* Forces exactly 1 column on small screens */
        }
        .topnav-links {
          display: none;
        }

        #topnav-hamburger {
          display: flex;
        }
        .math-btn-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        #page-container {
          padding: 16px;
        }
        #quiz-header {
          top: 41px;
        }
      }

      /* ─── Subject Folder Labels (Full Width) ─── */
      .subject-folder-label {
        display: flex; /* Changed from inline-flex so it stretches */
        width: 100%; /* Forces it to fill the container */
        align-items: center;
        background: var(--folder);
        color: var(--txt);
        padding: 10px 16px;
        border: 2px solid var(--folder-border);
        border-radius: 8px; /* Rounded evenly on all corners for a clean bar look */
        font-size: 1.15rem;
        font-weight: 700;
        box-shadow: 4px 4px 0 var(--folder-border);
        margin-bottom: 18px;
        gap: 10px;
      }

      let closeDrawer = () => {};

      let DB = {};

      function loadDB() {
        try {
          const raw = localStorage.getItem("quizforge_db");
          DB = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));
        } catch {
          DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
      }

      function saveDB() {
        localStorage.setItem("quizforge_db", JSON.stringify(DB));
      }

      function getExamStatus(examId) {
        const p = DB.progress[examId];
        if (!p) return "new";
        return p.completed ? "done" : "inprog";
      }

      // ─── Runtime App Context Matrix ───
      let quizState = null;
      let currentPage = "home";
      let adminForm = {
        subjectId: null,
        examId: null,
        type: "mcq",
        choices: [],
        editingQid: null,
      };
      let reviewMistakesOnly = false;

      function handleExamCardClick(subjectId, examId) {
        const attemptRecord = DB.progress[examId];
        if (attemptRecord && attemptRecord.completed) {
          renderLastAttemptInterceptScreen(subjectId, examId, attemptRecord);
        } else {
          startQuiz(subjectId, examId, true);
        }
      }

      function renderLastAttemptInterceptScreen(subjectId, examId, record) {
        currentPage = "intercept";
        const container = document.getElementById("page-content");
        if (!container) return;

        const subj = DB.subjects.find((s) => s.id === subjectId);
        const exam = subj?.exams.find((e) => e.id === examId);
        document.getElementById("breadcrumb").innerHTML =
          `Quiz Entry Controls › <span>${escHtml(exam.name)} History</span>`;

        const pct = Math.round((record.score / record.total) * 100);

        container.innerHTML = `
          <div class="card" style="text-align:center; padding: 40px 20px;">
            <h2 style="font-size:1.5rem; margin-bottom:8px;">Attempt Found for ${escHtml(exam.name)}</h2>
            <p style="color:var(--txt2); font-size:0.9rem; margin-bottom:24px;">You have already completed this exam module performance tracker.</p>
            
            <div style="display:inline-flex; gap:30px; margin-bottom:30px; background:var(--bg3); padding:16px 32px; border-radius:12px;">
              <div>
                <div style="font-size:1.8rem; font-weight:800; color:var(--accent); line-height:1.1">${record.score}/${record.total}</div>
                <div style="font-size:0.75rem; text-transform:uppercase; color:var(--txt2); font-weight:600; margin-top:4px;">Last Score</div>
              </div>
              <div style="border-left:1px solid var(--border)"></div>
              <div>
                <div style="font-size:1.8rem; font-weight:800; color:var(--accent2); line-height:1.1">${pct}%</div>
                <div style="font-size:0.75rem; text-transform:uppercase; color:var(--txt2); font-weight:600; margin-top:4px;">Accuracy</div>
              </div>
            </div>
            
            <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
              <button class="btn btn-primary" onclick="loadSavedAttemptIntoQuizState('${subjectId}', '${examId}')">🔎 Review Last Attempt</button>
              <button class="btn btn-secondary" onclick="startQuiz('${subjectId}', '${examId}', true)">🔄 Retake Exam (Shuffle Everything)</button>
              <button class="btn btn-secondary" onclick="renderPage('home')" style="background:transparent; border-color:transparent;">Back to Menu</button>
            </div>
          </div>
        `;
      }

      function loadSavedAttemptIntoQuizState(subjectId, examId) {
        const subj = DB.subjects.find((s) => s.id === subjectId);
        const exam = subj?.exams.find((e) => e.id === examId);
        const record = DB.progress[examId];

        quizState = {
          subjectId,
          examId,
          subjectName: subj.name,
          examName: exam.name,
          questions: [...exam.questions],
          answers: { ...(record.answers || {}) },
          submitted: Object.fromEntries(
            Object.keys(record.answers || {}).map((k) => [k, true]),
          ),
          score: record.score,
          total: record.total,
          finished: true,
        };

        reviewMistakesOnly = false;
        renderPage("summary");
      }

      function startQuiz(subjectId, examId, shuffle = true) {
        const subj = DB.subjects.find((s) => s.id === subjectId);
        const exam = subj?.exams.find((e) => e.id === examId);
        if (!exam || !exam.questions.length) {
          showToast("No questions available in this shell.", "error");
          return;
        }

        let questions = JSON.parse(JSON.stringify(exam.questions));

        if (shuffle) {
          questions = shuffleArr(questions);
          questions.forEach((q) => {
            if (q.type !== "tf" && q.choices && q.choices.length) {
              q.choices = shuffleArr(q.choices);
            }
          });
        }

        quizState = {
          subjectId,
          examId,
          subjectName: subj.name,
          examName: exam.name,
          questions,
          answers: {},
          submitted: {},
          score: 0,
          total: questions.length,
          finished: false,
        };

        const saved = DB.progress[examId];
        if (saved && !shuffle) {
          quizState.answers = { ...(saved.answers || {}) };
          quizState.submitted = Object.fromEntries(
            Object.keys(quizState.answers).map((k) => [k, true]),
          );
        }

        renderPage("quiz");
      }

      function finishQuiz() {
        quizState.finished = true;

        let correct = 0;
        quizState.questions.forEach((q) => {
          const ans = quizState.answers[q.id] || [];
          if (arraysEqual(ans.sort(), [...q.correct].sort())) correct++;
        });

        quizState.score = correct;

        DB.progress[quizState.examId] = {
          score: correct,
          total: quizState.total,
          answers: { ...quizState.answers },
          completed: true,
          completedAt: Date.now(),
        };

        saveDB();
        buildTopnavSubjects();
        reviewMistakesOnly = false;
        renderPage("summary");
      }

      // ─── Unified View Router ───
      function renderPage(page) {
        currentPage = page;
        const container = document.getElementById("page-content");
        if (!container) return;
        container.innerHTML = "";

        document
          .querySelectorAll("[data-nav]")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelectorAll(`[data-nav="${page}"]`)
          .forEach((b) => b.classList.add("active"));

        switch (page) {
          case "home":
            renderHome(container);
            break;
          case "quiz":
            renderQuiz(container);
            break;
          case "summary":
            renderSummary((c) =>
              document.getElementById("page-content").appendChild(c),
            );
            break;
          case "admin":
            renderAdmin(container);
            break;
          case "data":
            renderData(container);
            break;
        }
      }

      // ─── Active Core Quiz Testing Layout ───
      function renderQuiz(c) {
        if (!quizState) {
          renderPage("home");
          return;
        }
        document.getElementById("breadcrumb").innerHTML =
          `Quiz Management › <span>${escHtml(quizState.examName)}</span>`;

        c.innerHTML = `
          <div id="quiz-header">
            <div class="quiz-title">${escHtml(quizState.examName)}</div>
            <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog" style="width:0%"></div></div>
            <button class="btn btn-secondary btn-sm" onclick="confirmFinish()">End Exam</button>
          </div>
          <div id="question-list"></div>
        `;

        const qList = c.querySelector("#question-list");
        quizState.questions.forEach((q, i) => {
          const card = document.createElement("div");
          card.className = "question-card";
          const isSubmitted = quizState.submitted[q.id];
          const savedAns = quizState.answers[q.id] || [];

          card.innerHTML = `
            <div class="q-number">Question ${i + 1} <span class="q-type-badge">${q.type.toUpperCase()}</span></div>
            <div class="q-text">${renderMarkdown(q.text)}</div>
            ${q.img ? `<div class="q-image-container"><img src="${q.img}" class="q-image-preview" alt="Question illustration asset"></div>` : ""}
            <div class="choices" id="choices-${q.id}"></div>
            <div class="q-actions">
              <span>${q.type === "multi" ? "💡 Multi-select (Choose 2 or more)" : ""}</span>
              <button class="btn btn-primary btn-sm" id="btn-${q.id}" onclick="submitQuestion('${q.id}')" ${isSubmitted ? 'disabled style="opacity:0.5;"' : ""}>
                ${isSubmitted ? "Submitted" : "Check"}
              </button>
            </div>
            <div id="fb-${q.id}"></div>
          `;

          const choicesBox = card.querySelector(`#choices-${q.id}`);
          q.choices.forEach((ch) => {
            const lbl = document.createElement("label");
            lbl.className = `choice-label ${q.type === "multi" ? "checkbox" : "radio"}`;
            const isSelected = savedAns.includes(ch.id);

            lbl.innerHTML = `
              <input type="${q.type === "multi" ? "checkbox" : "radio"}" name="r-${q.id}" value="${ch.id}" ${isSelected ? "checked" : ""} ${isSubmitted ? "disabled" : ""}>
              <span class="choice-custom">${q.type === "multi" ? "✓" : "●"}</span>
              <span class="choice-text">${renderInlineMarkdown(ch.text)}</span>
              <span class="choice-icon"></span>
            `;

            if (isSelected) lbl.classList.add("selected");

            if (!isSubmitted) {
              lbl.querySelector("input").addEventListener("change", (e) => {
                if (q.type !== "multi") {
                  choicesBox
                    .querySelectorAll(".choice-label")
                    .forEach((l) => l.classList.remove("selected"));
                }
                lbl.classList.toggle("selected", e.target.checked);

                const checked = [];
                choicesBox
                  .querySelectorAll("input:checked")
                  .forEach((i) => checked.push(i.value));
                quizState.answers[q.id] = checked;
              });
            } else {
              lbl.classList.add("disabled");
              if (q.correct.includes(ch.id)) lbl.classList.add("correct");
              else if (isSelected) lbl.classList.add("incorrect");
            }
            choicesBox.appendChild(lbl);
          });

          qList.appendChild(card);
          if (isSubmitted)
            showFeedbackBox(q, savedAns, card.querySelector(`#fb-${q.id}`));
        });
        updateProgressFill();
      }

      function submitQuestion(qId) {
        const q = quizState.questions.find((x) => x.id === qId);
        if (!q) return;
        const ans = quizState.answers[q.id] || [];
        if (!ans.length) {
          showToast("Select an choice first!", "error");
          return;
        }

        quizState.submitted[qId] = true;
        saveDB();
        updateProgressFill();
        renderPage("quiz");
      }

      function showFeedbackBox(q, ans, box) {
        const isCorrect = arraysEqual(ans.sort(), [...q.correct].sort());
        box.innerHTML = `
          <div class="feedback-box ${isCorrect ? "correct" : "incorrect"}">
            <div class="feedback-title">${isCorrect ? "✓ Correct" : "✗ Incorrect"}</div>
            ${q.explanation ? `<div class="explanation">${renderMarkdown(q.explanation)}</div>` : ""}
          </div>
        `;
      }

      function updateProgressFill() {
        if (!quizState) return;
        const done = Object.keys(quizState.submitted).length;
        const fill = document.getElementById("quiz-prog");
        if (fill)
          fill.style.width = `${(done / quizState.questions.length) * 100}%`;
      }

      function confirmFinish() {
        showModal("Finish Test", "Are you sure you want to grade and exit?", [
          { label: "Return", cls: "btn-secondary", action: closeModal },
          {
            label: "Grade & Finish",
            cls: "btn-primary",
            action: () => {
              closeModal();
              finishQuiz();
            },
          },
        ]);
      }

      // ─── Performance Summary Framework & Live Filtering Toggle ───
      function renderSummary(appendCallback) {
        document.getElementById("breadcrumb").innerHTML =
          "Evaluation Framework";
        const pct = Math.round((quizState.score / quizState.total) * 100);

        const wrapper = document.createElement("div");
        wrapper.innerHTML = `
          <div class="summary-hero">
            <div class="summary-score">${quizState.score}<span>/${quizState.total}</span></div>
            <div style="margin-top:5px; font-weight:500;">Score Metrics Evaluated: Total accuracy evaluated at ${pct}%</div>
          </div>
          <div style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
            <button class="btn btn-primary" onclick="startQuiz(quizState.subjectId, quizState.examId, true)">🔄 Retake Shuffled</button>
            <button class="btn btn-secondary" onclick="renderPage('home')">Menu</button>
            
            <label class="review-toggle" id="mistake-toggle-element">
              <div class="toggle-switch ${reviewMistakesOnly ? "on" : ""}" id="mistake-toggle-switch"></div>
              <span>Review Mistakes Only</span>
            </label>
          </div>
          <div id="summary-cards-box"></div>
        `;

        appendCallback(wrapper);

        document
          .getElementById("mistake-toggle-element")
          .addEventListener("click", () => {
            reviewMistakesOnly = !reviewMistakesOnly;
            document
              .getElementById("mistake-toggle-switch")
              .classList.toggle("on", reviewMistakesOnly);
            generateSummaryQuestionCards();
          });

        generateSummaryQuestionCards();
      }

      function generateSummaryQuestionCards() {
        const container = document.getElementById("summary-cards-box");
        if (!container) return;
        container.innerHTML = "";

        let renderedCount = 0;

        quizState.questions.forEach((q, idx) => {
          const ans = quizState.answers[q.id] || [];
          const isCorrect = arraysEqual(ans.sort(), [...q.correct].sort());

          if (reviewMistakesOnly && isCorrect) return;
          renderedCount++;

          const card = document.createElement("div");
          card.className = "question-card";

          card.innerHTML = `
            <div class="q-number">Q${idx + 1} <span style="margin-left:auto; color:${isCorrect ? "var(--success)" : "var(--danger)"}">${isCorrect ? "Correct" : "Missed"}</span></div>
            <div class="q-text">${renderMarkdown(q.text)}</div>
            ${q.img ? `<div class="q-image-container"><img src="${q.img}" class="q-image-preview" alt="Historical verification review asset"></div>` : ""}
            <div class="choices">
              ${q.choices
                .map((ch) => {
                  const choiceSelected = ans.includes(ch.id);
                  const choiceCorrect = q.correct.includes(ch.id);
                  let matchCls = "";
                  if (choiceSelected && choiceCorrect) matchCls = "correct";
                  else if (choiceSelected && !choiceCorrect)
                    matchCls = "incorrect";
                  else if (!choiceSelected && choiceCorrect)
                    matchCls = "show-correct";

                  return `
                  <div class="choice-label disabled ${matchCls}">
                    <span class="choice-text">${renderInlineMarkdown(ch.text)}</span>
                  </div>
                `;
                })
                .join("")}
            </div>
            <div class="feedback-box ${isCorrect ? "correct" : "incorrect"}">
              <div><strong>Explanation:</strong> ${q.explanation ? renderMarkdown(q.explanation) : "No metrics documented."}</div>
            </div>
          `;
          container.appendChild(card);
        });

        if (renderedCount === 0 && reviewMistakesOnly) {
          container.innerHTML = `
            <div class="card" style="text-align:center; padding: 40px; color:var(--txt2);">
              <h3 style="color:var(--success); margin-bottom:6px;">🎉 Zero Mistakes Mapped!</h3>
              <p style="font-size:0.88rem;">You aced this entire quiz assessment stack flawlessly.</p>
            </div>
          `;
        }
      }

          .forEach((b) => b.classList.remove("active"));
        const activeBtn = document.getElementById(
          t === "questions" ? "tab-q" : t === "manage" ? "tab-m" : "tab-s",
        );
        if (activeBtn) activeBtn.classList.add("active");

        const wrk = document.getElementById("admin-workspace");
        if (!wrk) return;

        if (t === "structure") {
          renderStructureTab(wrk);
        } else if (t === "manage") {
          renderManageTab(wrk);
        } else {
          renderQuestionFormTab(wrk);
        }
      }

      function renderStructureTab(wrk) {
        wrk.innerHTML = `
          <div class="card">
            <h3>Configure New Master Subject Context</h3>

            <button class="btn btn-primary" onclick="saveExamStructure()" style="margin-top:10px;">Save Exam Shell</button>
          </div>
          <div class="card" style="margin-top:15px;">
            <h3 style="margin-bottom:12px;">Existing Subjects &amp; Exams</h3>
            <div id="structure-list"></div>

      function renameSubject(sid) {
        const subj = DB.subjects.find((s) => s.id === sid);
        if (!subj) return;
        showInputModal("Rename Subject", "Subject Name", subj.name, (val) => {
          subj.name = val;
          saveDB();
          buildTopnavSubjects();
          renderStructureList();
          showToast("Subject renamed.", "success");
        });
      }

      function renameExam(sid, eid) {
        const subj = DB.subjects.find((s) => s.id === sid);
        const exam = subj?.exams.find((e) => e.id === eid);
        if (!exam) return;
        showInputModal("Rename Exam", "Exam Name", exam.name, (val) => {
          exam.name = val;
          saveDB();
          buildTopnavSubjects();
          renderStructureList();
          showToast("Exam renamed.", "success");
        });
      }

      function deleteSubject(sid) {
        const subj = DB.subjects.find((s) => s.id === sid);
        if (!subj) return;
        showModal(
          "Delete Subject",
          `This will permanently delete <strong>${escHtml(subj.name)}</strong> and all ${subj.exams.length} exam shell(s) inside it, including every saved question and progress record. Are you sure?`,
          [
            { label: "Cancel", cls: "btn-secondary", action: closeModal },
            {
              label: "Delete Subject",
              cls: "btn-danger",
              action: () => {
                subj.exams.forEach((e) => delete DB.progress[e.id]);
                DB.subjects = DB.subjects.filter((s) => s.id !== sid);

                if (adminForm.subjectId === sid) {
                  adminForm.subjectId = null;
                  adminForm.examId = null;
                }
                if (quizState?.subjectId === sid) quizState = null;

                saveDB();
                closeModal();
                showToast("Subject deleted.", "success");
                buildTopnavSubjects();
                renderStructureTab(document.getElementById("admin-workspace"));
              },
            },
          ],
        );
      }

      function deleteExam(sid, eid) {
        const subj = DB.subjects.find((s) => s.id === sid);
        const exam = subj?.exams.find((e) => e.id === eid);
        if (!exam) return;
        showModal(
          "Delete Exam",
          `This will permanently delete <strong>${escHtml(exam.name)}</strong>, including all ${exam.questions.length} question(s) and any saved progress. Are you sure?`,
          [
            { label: "Cancel", cls: "btn-secondary", action: closeModal },
            {
              label: "Delete Exam",
              cls: "btn-danger",
              action: () => {
                delete DB.progress[eid];
                subj.exams = subj.exams.filter((e) => e.id !== eid);

                if (adminForm.examId === eid) adminForm.examId = null;
                if (quizState?.examId === eid) quizState = null;

                saveDB();
                closeModal();
                showToast("Exam deleted.", "success");
                buildTopnavSubjects();
                renderStructureTab(document.getElementById("admin-workspace"));
              },
            },
          ],
        );
      }

      function renderManageTab(wrk) {
        wrk.innerHTML = `
          <div class="card">
            <div class="form-group">
              <label class="form-label">Subject</label>
              <select id="manage-sid" class="form-input"></select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Exam Shell</label>
              <select id="manage-eid" class="form-input"></select>
            </div>
          </div>
          <div class="card" style="margin-top:15px;">
            <h3 style="margin-bottom:10px;">Saved Questions</h3>
            <div id="manage-q-list"></div>
          </div>
        `;

        const sSel = wrk.querySelector("#manage-sid");
        const eSel = wrk.querySelector("#manage-eid");
        sSel.innerHTML = DB.subjects
          .map((s) => `<option value="${s.id}">${escHtml(s.name)}</option>`)
          .join("");

        const refreshExams = () => {
          const matchSubj = DB.subjects.find((s) => s.id === sSel.value);
          eSel.innerHTML =
            matchSubj && matchSubj.exams.length
              ? matchSubj.exams
                  .map(
                    (e) =>
                      `<option value="${e.id}">${escHtml(e.name)}</option>`,
                  )
                  .join("")
              : '<option value="">No exam shells available</option>';
          renderManageQuestionList();
        };

        sSel.addEventListener("change", () => {
          adminForm.subjectId = sSel.value;
          refreshExams();
        });
        eSel.addEventListener("change", () => {
          adminForm.examId = eSel.value;
          renderManageQuestionList();
        });

        if (
          adminForm.subjectId &&
          DB.subjects.find((s) => s.id === adminForm.subjectId)
        ) {
          sSel.value = adminForm.subjectId;
        }
        refreshExams();
        if (adminForm.examId) {
          const exists = Array.from(eSel.options).some(
            (o) => o.value === adminForm.examId,
          );
          if (exists) eSel.value = adminForm.examId;
        }
        renderManageQuestionList();
      }

      function renderManageQuestionList() {
        const sid = document.getElementById("manage-sid")?.value;
        const eid = document.getElementById("manage-eid")?.value;
        const listBox = document.getElementById("manage-q-list");
        if (!listBox) return;

        const subj = DB.subjects.find((s) => s.id === sid);
        const exam = subj?.exams.find((e) => e.id === eid);
        if (!exam) {
          listBox.innerHTML =
            '<p style="color:var(--txt2); font-size:0.85rem;">No exam shell selected.</p>';
          return;
        }
        if (!exam.questions.length) {
          listBox.innerHTML =
            '<p style="color:var(--txt2); font-size:0.85rem;">No questions saved in this exam yet.</p>';
          return;
        }

        const TYPE_LABELS = { mcq: "MCQ", tf: "T/F", multi: "MULTI" };
        listBox.innerHTML = exam.questions
          .map((q, idx) => {
            const sanitizedText = escHtml(q.text);
            const excerpt =
              sanitizedText.length > 90
                ? sanitizedText.slice(0, 90).trim() + "…"
                : sanitizedText;
            return `
            <div style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);">
              <span class="q-type-badge">${TYPE_LABELS[q.type] || q.type.toUpperCase()}</span>
              <span style="flex:1; font-size:0.88rem;">${idx + 1}. ${excerpt}</span>
              <button class="btn btn-secondary btn-sm" onclick="editQuestion('${sid}','${eid}','${q.id}')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pen-icon lucide-pen"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg> Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteQuestion('${sid}','${eid}','${q.id}')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers-minus-icon lucide-layers-minus"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 .83.18 2 2 0 0 0 .83-.18l8.58-3.9a1 1 0 0 0 0-1.832z"/><path d="M16 17h6"/><path d="M2.003 11.995a1 1 0 0 0 .597.915l8.58 3.91a2 2 0 0 0 .83.18"/><path d="M2.003 16.995a1 1 0 0 0 .597.915l8.58 3.91a2 2 0 0 0 .83.18 2 2 0 0 0 .83-.18l2.11-.96"/><path d="M22.018 12.004a1 1 0 0 1-.598.916l-.177.08"/></svg> Delete</button>
            </div>
          `;
          })
          .join("");
      }

      function deleteQuestion(sid, eid, qid) {
        showModal(
          "Confirm Removal",
          "Are you sure you want to permanently remove this question entry?",
          [
            { label: "Cancel", cls: "btn-secondary", action: closeModal },
            {
              label: "Delete",
              cls: "btn-danger",
              action: () => {
                const subj = DB.subjects.find((s) => s.id === sid);
                const exam = subj?.exams.find((e) => e.id === eid);
                if (exam) {
                  const i = exam.questions.findIndex((q) => q.id === qid);
                  if (i !== -1) exam.questions.splice(i, 1);
                }
                saveDB();
                closeModal();
                showToast("Question entry removed.", "success");
                buildTopnavSubjects();
                renderManageQuestionList();
              },
            },
          ],
        );
      }

      function editQuestion(sid, eid, qid) {
        adminForm.subjectId = sid;
        adminForm.examId = eid;
        adminForm.editingQid = qid;
        switchAdminTab("questions");
      }

      function renderQuestionFormTab(wrk) {
        const isEditing = !!adminForm.editingQid;
        let qRef = null;
        uploadedImageBase64 = "";

        if (isEditing) {
          const subj = DB.subjects.find((s) => s.id === adminForm.subjectId);
          const exam = subj?.exams.find((e) => e.id === adminForm.examId);
          qRef = exam?.questions.find((q) => q.id === adminForm.editingQid);
          if (qRef) {
            adminForm.type = qRef.type;
            uploadedImageBase64 = qRef.img || "";
          }
        }

        wrk.innerHTML = `
          <div class="card">
            ${isEditing ? `<p style="font-size:0.82rem; color:var(--accent); font-weight:700; margin-bottom:10px;">✏️ Editing existing question — saving will overwrite this entry.</p>` : ""}
            <div class="form-group">
              <label class="form-label">Target Subject Alignment</label>
              <select id="form-sid" class="form-input" ${isEditing ? "disabled style='opacity:0.6; cursor:not-allowed;'" : ""}></select>
            </div>
            <div class="form-group">
              <label class="form-label">Target Exam Shell Alignment</label>
              <select id="form-eid" class="form-input" ${isEditing ? "disabled style='opacity:0.6; cursor:not-allowed;'" : ""}></select>
            </div>
            <div class="form-group">
              <label class="form-label">Question Mechanics Mode</label>
              <select id="form-type" class="form-input" onchange="adaptQuestionFormType(this.value)">
                <option value="mcq">Single Option Selection (MCQ)</option>
                <option value="tf">Boolean Constraints (True/False)</option>
                <option value="multi">Comprehensive Checkbox Compilation (Multi-Select)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Core Prompt Assessment Text (Supports Markdown Strings)</label>
              <textarea id="form-text" class="form-input" placeholder="Input question body specifications here..."></textarea>
            </div>
            
            

            <div class="form-group">
              <label class="form-label">Response Assessment Arrays</label>
              <div id="form-choices-box"></div>
              <button class="btn btn-secondary btn-sm" id="form-add-btn" onclick="appendChoiceRowInput()" style="margin-top:10px;">+ Append Alternative Choice Option</button>
            </div>
            <div class="form-group">
              <label class="form-label">Explanatory Feedback Context</label>
              <textarea id="form-expl" class="form-input" placeholder="Document dynamic feedback logic matrices here..."></textarea>
            </div>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-primary" onclick="commitSavedQuestionToDatabase()">${isEditing ? "💾 Save Updated Changes" : "Append Question Node to Exam"}</button>
              ${isEditing ? `<button class="btn btn-secondary" onclick="cancelEditQuestion()">Cancel Edit</button>` : ""}
            </div>
          </div>
        `;

        const sSel = wrk.querySelector("#form-sid");
        const eSel = wrk.querySelector("#form-eid");
        sSel.innerHTML = DB.subjects
          .map((s) => `<option value="${s.id}">${escHtml(s.name)}</option>`)
          .join("");

        const refreshExams = () => {
          const matchSubj = DB.subjects.find((s) => s.id === sSel.value);
          eSel.innerHTML =
            matchSubj && matchSubj.exams.length
              ? matchSubj.exams
                  .map(
                    (e) =>
                      `<option value="${e.id}">${escHtml(e.name)}</option>`,
                  )
                  .join("")
              : '<option value="">Create an Exam shell first</option>';
        };

        sSel.addEventListener("change", refreshExams);

        if (
          adminForm.subjectId &&
          DB.subjects.find((s) => s.id === adminForm.subjectId)
        ) {
          sSel.value = adminForm.subjectId;
        }
        refreshExams();
        if (adminForm.examId) {
          const exists = Array.from(eSel.options).some(
            (o) => o.value === adminForm.examId,
          );
          if (exists) eSel.value = adminForm.examId;
        }

        if (isEditing && qRef) {
          document.getElementById("form-type").value = qRef.type;
          document.getElementById("form-text").value = qRef.text;
          document.getElementById("form-expl").value = qRef.explanation || "";
          adaptQuestionFormType(qRef.type, qRef);
        } else {
          adaptQuestionFormType(adminForm.type);
        }
        // ─── Activate the Rich Content Composer on text fields ───
        enhanceTextareaWithRichEditor(document.getElementById("form-text"));
        enhanceTextareaWithRichEditor(document.getElementById("form-expl"));
      }

      function cancelEditQuestion() {
        adminForm.editingQid = null;
        switchAdminTab("manage");
      }

      function adaptQuestionFormType(val, prefillQuestion = null) {
        adminForm.type = val;
        const box = document.getElementById("form-choices-box");
        const addBtn = document.getElementById("form-add-btn");
        if (!box) return;
        box.innerHTML = "";

        if (val === "tf") {
          addBtn.style.display = "none";
          const trueChecked = prefillQuestion?.correct?.includes("true")
            ? "checked"
            : "";
          const falseChecked = prefillQuestion?.correct?.includes("false")
            ? "checked"
            : "";
          box.innerHTML = `
            <div class="choice-row"><input type="radio" name="tf-correct" value="true" ${trueChecked}> <span>True Option Constraint</span></div>
            <div class="choice-row"><input type="radio" name="tf-correct" value="false" ${falseChecked}> <span>False Option Constraint</span></div>
          `;
        } else {
          addBtn.style.display = "inline-flex";
          if (prefillQuestion && prefillQuestion.choices.length) {
            prefillQuestion.choices.forEach((ch) => {
              const isCorrect = prefillQuestion.correct.includes(ch.id);
              appendChoiceRowInput(ch.text, isCorrect);
            });
          } else {
            appendChoiceRowInput();
            appendChoiceRowInput();
          }
        }
      }

      function appendChoiceRowInput(prefillText = "", prefillChecked = false) {
        const box = document.getElementById("form-choices-box");
        if (!box) return;
        const idx = box.children.length;
        const div = document.createElement("div");
        div.className = "choice-row";
        const inputType = adminForm.type === "multi" ? "checkbox" : "radio";
        div.innerHTML = `
          <input type="${inputType}" name="admin-c" value="${idx}" ${prefillChecked ? "checked" : ""}>
          <input type="text" class="form-input row-txt" placeholder="Response Label String Value" style="margin:0 5px;" value="${prefillText.replace(/"/g, "&quot;")}">
          <div class="row-tools">
            <button type="button" class="row-tool-btn" title="Insert a math symbol or equation">∑</button>
          </div>
        `;
        box.appendChild(div);

        const textInput = div.querySelector(".row-txt");
        div.querySelector(".row-tool-btn").addEventListener("click", () => {
          showMathBuilderModal(textInput);
        });
      }

      function commitSavedQuestionToDatabase() {
        const sid = document.getElementById("form-sid").value;
        const eid = document.getElementById("form-eid").value;
        const text = document.getElementById("form-text").value.trim();
        const expl = document.getElementById("form-expl").value.trim();

        if (!sid || !eid || !text) {
          showToast("Complete prompt criteria tracking data updates.", "error");
          return;
        }
        const subj = DB.subjects.find((s) => s.id === sid);
        const exam = subj?.exams.find((e) => e.id === eid);
        if (!exam) return;

        let choices = [];
        let correct = [];

        if (adminForm.type === "tf") {
          choices = [
            { id: "true", text: "True" },
            { id: "false", text: "False" },
          ];
          const checked = document.querySelector(
            'input[name="tf-correct"]:checked',
          );
          if (!checked) {
            showToast("Pick boolean alignment state.", "error");
            return;
          }
          correct = [checked.value];
        } else {
          const rows = document.querySelectorAll(
            "#form-choices-box .choice-row",
          );
          rows.forEach((r, idx) => {

      function arraysEqual(a, b) {
        return a.length === b.length && a.every((v, i) => v === b[i]);
      }

      // Safe global random sorting matrix
      function shuffleArr(arr) {
        let shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderMarkdown(t) {
        if (typeof marked !== "undefined") {
          try {
            let processedText = (t || "")
              .replace(/\\\(/g, "$")
              .replace(/\\\)/g, "$")
              .replace(/\\\[/g, "$$")
              .replace(/\\\]/g, "$$");

            let html = marked.parse(processedText);
            let tempDiv = document.createElement("div");
            tempDiv.innerHTML = html;

            if (typeof renderMathInElement !== "undefined") {
              renderMathInElement(tempDiv, {
                delimiters: [
                  { left: "$$", right: "$$", display: true },
                  { left: "$", right: "$", display: false },
                ],
                throwOnError: false,
              });
            }
            return tempDiv.innerHTML;
          } catch (e) {
            console.error("Markdown/Math parser error: ", e);
          }
        }
        return t || "";
      }
      function renderInlineMarkdown(t) {
        if (typeof marked !== "undefined") {
          try {
            let processedText = (t || "")
              .replace(/\\\(/g, "$")
              .replace(/\\\)/g, "$")
              .replace(/\\\[/g, "$$")
              .replace(/\\\]/g, "$$");

            // parseInline = no wrapping <p> tags, stays as a flat span-level output
            let html = marked.parseInline(processedText);
            let tempSpan = document.createElement("span");
            tempSpan.innerHTML = html;

            if (typeof renderMathInElement !== "undefined") {
              renderMathInElement(tempSpan, {
                delimiters: [
                  { left: "$$", right: "$$", display: true },
                  { left: "$", right: "$", display: false },
                ],
                throwOnError: false,
              });
            }
            return tempSpan.innerHTML;
          } catch (e) {
            console.error("Inline markdown/math parser error:", e);
          }
        }
        return escHtml(t || "");
      }

      // Insert raw text at the cursor position (textarea OR input)
      function insertTextAtCursor(el, text) {
        const start = el.selectionStart ?? el.value.length;
        const end = el.selectionEnd ?? el.value.length;
        const val = el.value;
        el.value = val.slice(0, start) + text + val.slice(end);
        const pos = start + text.length;
        el.focus();
        el.setSelectionRange(pos, pos);
        el.dispatchEvent(new Event("input"));
      }

      // Wrap the current selection (or a placeholder) with before/after markers
      function wrapSelection(el, before, after, placeholder) {
        const start = el.selectionStart ?? el.value.length;
        const end = el.selectionEnd ?? el.value.length;
        const val = el.value;
        const selected = val.slice(start, end) || placeholder;
        el.value =
          val.slice(0, start) + before + selected + after + val.slice(end);
        const cursorPos =
          start + before.length + selected.length + after.length;
        el.focus();
        el.setSelectionRange(cursorPos, cursorPos);
        el.dispatchEvent(new Event("input"));
      }

        textarea.parentNode.insertBefore(wrap, textarea);

        const preview = document.createElement("div");

        preview.innerHTML =
          '<div class="rich-preview-label">Live Preview — this is what students will see</div><div class="rich-preview-body"></div>';
        wrap.appendChild(preview);

        const updatePreview = () => {
          previewBody.innerHTML =

            '<span style="color:var(--txt2)">Nothing to preview yet…</span>';
        };
        textarea.addEventListener("input", updatePreview);
        updatePreview();

        toolbar.querySelectorAll(".rt-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            switch (btn.dataset.action) {
              case "bold":
                wrapSelection(textarea, "**", "**", "bold text");
                break;
              case "italic":
                wrapSelection(textarea, "*", "*", "italic text");
                break;
              case "inline-code":
                wrapSelection(textarea, "`", "`", "code");

                showCodeBlockModal(textarea);

        const toggleTheme = () => {
          const nextDark =
            document.documentElement.getAttribute("data-theme") !== "dark";
          document.documentElement.setAttribute(
            "data-theme",
            nextDark ? "dark" : "light",
          );
          document.getElementById("theme-toggle").innerHTML = nextDark
            ? SUN_SVG
            : MOON_SVG;
        };
        document
          .getElementById("theme-toggle")
          .addEventListener("click", toggleTheme);

        // Desktop nav buttons
        document.querySelectorAll(".topnav-btn").forEach((b) =>
          b.addEventListener("click", () => {
            quizState = null;
            renderPage(b.dataset.nav);
          }),
        );

        // Drawer nav buttons
        document.querySelectorAll(".drawer-btn").forEach((b) =>
          b.addEventListener("click", () => {
            quizState = null;
            closeDrawer();
            renderPage(b.dataset.nav);
          }),
        );
        loadDB();
        buildTopnavSubjects();
        renderPage("home");
      });
    </script>
